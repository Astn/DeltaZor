name: Publish NuGet

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
          source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore src/csharp/DeltaZor.sln -m:1

      - name: Build
        run: dotnet build src/csharp/DeltaZor.sln --configuration Release --no-restore -m:1 -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test src/csharp/DeltaZorTests/DeltaZorTests.csproj --configuration Release --no-build --verbosity normal

      - name: Pack DeltaZor
        run: dotnet pack src/csharp/DeltaZor/DeltaZor.csproj --configuration Release --no-build -p:Version=${{ steps.version.outputs.VERSION }} --output ./nupkgs

      - name: Push to GitHub Packages
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate
